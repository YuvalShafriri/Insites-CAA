<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Songoy-Cojal Assessment Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    :root{
      --bg:#f8fafc;
      --card:#ffffff;
      --line:#e2e8f0;
      --text:#1e293b;
      --muted:#64748b;
      --soft:#94a3b8;
      --accent:#2563eb;
      --accent-soft:#dbeafe;
      --good:#16a34a;
      --warn:#ca8a04;
      --bad:#dc2626;
      --shadow:0 14px 32px rgba(15,23,42,.08);
      --radius:18px;
      --radius-sm:12px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif}
    body{min-height:100vh}
    .app{max-width:1440px;margin:0 auto;padding:20px}
    .hero,.card,.guide,.report-shell,.muted-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .hero{padding:22px;margin-bottom:14px;background:linear-gradient(135deg,#eff6ff 0%,#fff 58%,#f8fafc 100%)}
    .hero-top,.section-head,.row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
    h1,h2,h3,h4,p{margin:0}
    h1{font-size:1.95rem;line-height:1.05}
    h2{font-size:1.15rem}
    h3{font-size:1rem}
    .sub{color:var(--muted);max-width:900px;line-height:1.55;margin-top:8px}
    .tabs{display:flex;gap:8px;overflow:auto;padding:4px 2px 12px}
    .tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 13px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap}
    .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .banner-wrap{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 12px}
    .banner,.back-pill,.pill,.badge,.mini-pill,.chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 11px;font-size:.9rem;border:1px solid var(--line);background:#fff;color:var(--muted)}
    .banner{background:var(--accent-soft);border-color:#bfdbfe;color:#1d4ed8}
    .back-pill{cursor:pointer}
    .badge.primary,.pill.primary,.chip.primary{background:var(--accent-soft);border-color:#bfdbfe;color:#1d4ed8}
    .badge.good,.pill.good,.chip.good{background:#ecfdf5;border-color:#bbf7d0;color:#15803d}
    .badge.warn,.pill.warn,.chip.warn{background:#fffbeb;border-color:#fde68a;color:#a16207}
    .badge.bad,.pill.bad,.chip.bad{background:#fef2f2;border-color:#fecaca;color:#b91c1c}
    .panel{display:none}
    .panel.active{display:block}
    .grid{display:grid;gap:16px}
    .g2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .g3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .g4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .card{padding:18px;min-width:0}
    .kpi{padding:16px;border:1px solid var(--line);border-radius:var(--radius-sm);background:linear-gradient(180deg,#fff 0%,#f8fbff 100%)}
    .kpi .label{font-size:.86rem;color:var(--muted);margin-bottom:8px}
    .kpi .value{font-size:1.8rem;font-weight:800;line-height:1}
    .kpi .desc{font-size:.94rem;color:var(--muted);margin-top:8px;line-height:1.45}
    .list{margin:0;padding-left:18px;line-height:1.55}
    .list li{margin:6px 0}
    .guide{padding:0;overflow:hidden;margin-bottom:12px}
    .guide-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 14px;cursor:pointer;background:#fff7ed}
    .guide-body{padding:14px;border-top:1px solid #fed7aa;display:grid;gap:10px}
    .guide.collapsed .guide-body{display:none}
    .micro{font-size:.76rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:800}
    .insight{background:#fef3c7;border-left:3px solid #f59e0b;padding:8px 10px;border-radius:10px;line-height:1.5}
    .stack{display:grid;gap:12px}
    .context,.value,.theme,.comp,.nara,.debrief-card,.muted-card{border:1px solid var(--line);border-radius:16px;padding:15px;background:#fff}
    .muted-card{background:linear-gradient(180deg,#fff 0%,#f8fafc 100%)}
    .active-card{border-color:#60a5fa;box-shadow:0 0 0 4px rgba(96,165,250,.14)}
    .theme.active-theme{border-color:#818cf8;box-shadow:0 0 0 4px rgba(129,140,248,.14)}
    .context p,.value p,.theme p,.comp p,.nara p{line-height:1.6}
    .clickable{cursor:pointer}
    .chip-row,.theme-switch,.kpis,.marker-note,.theme-members{display:flex;gap:8px;flex-wrap:wrap}
    .chip{cursor:pointer;font-weight:700}
    .chip.active,.mini-pill.active{background:var(--accent-soft);border-color:#93c5fd;color:#1d4ed8}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;font-size:.95rem}
    th{font-size:.8rem;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
    .map-box{height:440px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#f8fafc}
    .map-placeholder{height:440px;border:1px dashed #94a3b8;border-radius:10px;display:grid;place-items:center;text-align:center;padding:24px;color:var(--muted);background:linear-gradient(180deg,#fff 0%,#f8fafc 100%)}
    .timeline-shell{position:relative;padding:20px 8px 6px;min-height:260px}
    .timeline-track{position:absolute;left:28px;right:28px;top:118px;height:3px;background:#dbeafe;border-radius:999px}
    .event{position:absolute;top:48px;width:220px;max-width:22vw;transform:translateX(-50%)}
    .event .dot{width:14px;height:14px;border-radius:999px;margin:0 auto 10px;border:3px solid #fff;box-shadow:0 0 0 2px currentColor;background:currentColor}
    .event .year{font-weight:800;text-align:center;font-size:.92rem}
    .event .label{margin-top:8px;font-size:.88rem;line-height:1.45;text-align:center;color:var(--muted)}
    .timeline-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:150px}
    .legend-item{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:.9rem}
    .sw{width:12px;height:12px;border-radius:999px;display:inline-block}
    .nara{border-left:6px solid var(--line)}
    .nara.high{border-left-color:var(--good)}
    .nara.medium{border-left-color:var(--warn)}
    .nara.low{border-left-color:var(--bad)}
    .callout{background:#fef2f2;border:1px solid #fecaca;border-radius:16px;padding:12px 14px;color:#7f1d1d;line-height:1.55}
    .heat td,.heat th{text-align:center}
    .impact-1{background:#fff}
    .impact-2{background:#fef3c7}
    .impact-3{background:#fecaca}
    .significance{padding:24px;background:linear-gradient(180deg,#fff 0%,#eff6ff 100%);border:1px solid #bfdbfe;border-radius:22px;line-height:1.75;font-size:1.03rem}
    .report-shell{padding:26px;max-width:900px}
    .report-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
    .report-section{border:1px solid var(--line);border-radius:16px;padding:16px;break-inside:avoid}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;font-weight:700;cursor:pointer}
    .theme-dot{width:10px;height:10px;border-radius:999px;display:inline-block}
    .mini-heat{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
    .mini-heat span{border:1px solid var(--line);border-radius:8px;padding:7px 6px;text-align:center;font-size:.8rem}
    .session-table{width:100%;border-collapse:collapse}
    .session-table td,.session-table th{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left}
    .coord-note,.small{font-size:.9rem;color:var(--muted);line-height:1.5}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.9rem}
    .hide{display:none !important}
    @media (max-width:1100px){.g4,.g3,.g2,.report-grid{grid-template-columns:1fr}.event{max-width:30vw}}
    @media (max-width:760px){.app{padding:12px}h1{font-size:1.55rem}.event{width:160px;max-width:38vw}.timeline-shell{min-height:340px}.timeline-track{top:142px}.timeline-legend{margin-top:210px}}
    @media print{
      body{background:#fff}
      .tabs,.banner-wrap,.guide,.btn,.actions{display:none !important}
      .panel{display:block !important}
      .hero,.card,.report-shell,.muted-card{box-shadow:none}
      *{background:#fff !important;color:#000 !important}
      .report-shell{border:none;padding:0;max-width:100%}
    }
  </style>
</head>

      overview: ['KPIs, summary, and data gaps.', 'Read the scope first, then the process blocks.', 'Look for where evidence is already strong and where chronology still limits the story.'],
      map: ['Asset and comparator locations.', 'Click markers or comparator names to jump across tabs.', 'Look for regional spacing: Songoy-Cojal sits between production evidence and broader valley networks.'],
      timeline: ['Events spaced proportionally by year.', 'Hover is not needed; read clusters and long gaps directly.', 'The main pattern is ancient use, then a long research gap, then concentrated modern investigation.'],
      cv: ['Contexts, values, and the attribute table.', 'Click contexts, values, or pills to highlight related material.', 'Look for repeated overlap around production, corridor setting, and debate.'],
      themes: ['Value, context, and threat clusters.', 'Click member pills to jump to their home tab.', 'The strongest clusters are production and corridor identity.'],
      integrity: ['Nara aspects plus vulnerability matrix.', 'Click a value elsewhere to see which integrity aspects matter most.', 'Material and use integrity carry the heaviest pressure on production-based significance.'],
      comparative: ['Comparator cards and regional summary.', 'Click comparator names to jump to the map.', 'The key difference is role: Songoy-Cojal reads as producer, not only as monument or consumer node.'],
      significance: ['The Stage 5 statement in one block.', 'Read it after comparison and integrity for full context.', 'Notice what is asserted clearly and what remains open.'],
      report: ['Printable one-page summary.', 'Use export or print controls when the sandbox allows it.', 'This tab condenses the strongest arguments without repeating every stage.'],
      debrief: ['User reflections after the assessment.', 'No interaction is needed here.', 'These notes describe trust and usability, not site evidence.'],
      session: ['Process-layer session analytics.', 'No interaction is needed here.', 'Use this tab to see where the user actively redirected the workflow.']
    };

    const state = {
      tab: getInitialTab(),
      highlight: null,
      backTab: null,
      guide: loadGuideState(),
      themeMode: 'valueThemes'
    };

    let mapInstance = null;
    let markerRefs = {};

    function getInitialTab() {
      try {
        const hash = (location.hash || '').replace('#','');
        return TABS.some(t => t.id === hash) ? hash : 'overview';
      } catch (e) {
        return 'overview';
      }
    }

    function loadGuideState() {
      const out = {};
      TABS.forEach(t => {
        try {
          out[t.id] = localStorage.getItem('guide_'+t.id) === 'collapsed';
        } catch (e) {
          out[t.id] = false;
        }
      });
      return out;
    }

    function saveGuide(tabId, collapsed) {
      try { localStorage.setItem('guide_'+tabId, collapsed ? 'collapsed' : 'open'); } catch (e) {}
    }

    function setTab(tab, manual = true) {
      state.tab = tab;
      if (manual) state.backTab = null;
      try { history.pushState({ tab }, '', '#'+tab); } catch (e) { try { location.hash = tab; } catch(err) {} }
      render();
    }

    function setHighlight(type, id, fromTab = null, jumpTab = null) {
      state.highlight = { type, id };
      state.backTab = fromTab;
      if (jumpTab) setTab(jumpTab, false);
      else render();
    }

    function clearHighlight() {
      state.highlight = null;
      state.backTab = null;
      render();
    }

    function activeClass(ok) { return ok ? 'active-card' : ''; }

    function themeIdsForValue(id) {
      return DATA.themes.valueThemes.filter(t => t.valueIds.includes(id)).map(t => t.id);
    }

    function themeIdsForContext(id) {
      return DATA.themes.contextThemes.filter(t => t.contextIds.includes(id)).map(t => t.id);
    }

    function highlightMatch(type, id) {
      if (!state.highlight) return false;
      if (state.highlight.type === type && state.highlight.id === id) return true;
      if (state.highlight.type === 'context' && type === 'value') {
        const ctx = DATA.contexts.find(c => c.id === state.highlight.id);
        return ctx && ctx.relatedValues.includes(id);
      }
      if (state.highlight.type === 'value' && type === 'context') {
        const val = state.highlight.id;
        const ctx = DATA.contexts.find(c => c.id === id);
        return ctx && ctx.relatedValues.includes(val);
      }
      if (state.highlight.type === 'value' && type === 'integrity') {
        const value = DATA.values.find(v => v.id === state.highlight.id);
        const n = id.toLowerCase();
        return value && DATA.authenticity.grid.find(g => g.id === id)?.valueExpression.toLowerCase().includes(value.category.toLowerCase());
      }
      if (state.highlight.type === 'theme' && type === 'value') {
        const t = DATA.themes.valueThemes.find(x => x.id === state.highlight.id);
        return t && t.valueIds.includes(id);
      }
      if (state.highlight.type === 'theme' && type === 'context') {
        const t = DATA.themes.contextThemes.find(x => x.id === state.highlight.id);
        return t && t.contextIds.includes(id);
      }
      if (state.highlight.type === 'theme' && type === 'threat') {
        return state.highlight.id === id;
      }
      return false;
    }

    function evidenceLabel(v) {
      return v.marker ? `${v.marker} ${v.evidence}` : v.evidence;
    }

    function badge(text, kind='') {
      return `<span class="badge ${kind}">${text}</span>`;
    }

    function chip(text, attrs = '', active = false) {
      return `<button class="chip ${active ? 'active' : ''}" ${attrs}>${text}</button>`;
    }

    function guide(tabId) {
      const [see, interact, look] = guideText[tabId];
      return `
        <div class="guide ${state.guide[tabId] ? 'collapsed' : ''}" data-guide="${tabId}">
          <div class="guide-head" data-action="toggle-guide" data-id="${tabId}">
            <strong>ℹ ${TABS.find(t => t.id === tabId).label}</strong>
            <span>${state.guide[tabId] ? '▸' : '▾'}</span>
          </div>
          <div class="guide-body">
            <div><div class="micro">What you see</div><div>${see}</div></div>
            <div><div class="micro">How to interact</div><div>${interact}</div></div>
            <div><div class="micro">What to look for</div><div class="insight">${look}</div></div>
          </div>
        </div>`;
    }

    function renderOverview() {

          <ul class="list">${DATA.gaps.map(g => `<li>${g}</li>`).join('')}</ul>
        </div>`;

    function renderMap() {

    function renderTimeline() {
      const min = Math.min(...DATA.timeline.map(t => t.yearStart));
      const max = Math.max(...DATA.timeline.map(t => t.yearStart));

      return `

        <div class="card">

          <div class="timeline-shell">
            <div class="timeline-track"></div>
            ${DATA.timeline.map((e, i) => {
              const left = ((e.yearStart - min) / (max - min)) * 100;
              return `<div class="event" style="left:${left}%;color:${color[e.changeType]}">
                <div class="dot"></div>
                <div class="year">${e.year}</div>
                <div class="label">${e.label}</div>
              </div>`;
            }).join('')}

          </div>

              }).join('')}</div>` : ''}
              ${mode === 'threatThemes' ? `<div class="mini-heat">${t.vulnerabilities.flatMap(v => v.cells.map(c => `<span class="${c === 'material' || c === 'use' ? 'impact-3' : 'impact-2'}">${v.value}<br>${c}</span>`)).join('')}</div>` : ''}

          <div class="table-wrap">
            <table class="session-table">
              <thead><tr><th>Stage</th><th>Action</th><th>What changed</th></tr></thead>
              <tbody>${DATA.session.interactionMap.map(r => `<tr><td>${r.stage}</td><td class="mono">${r.action}</td><td>${r.change}</td></tr>`).join('')}</tbody>
            </table>
          </div>
          <div class="grid g3">
            <div class="debrief-card"><div class="micro">Interaction style</div><p style="margin-top:8px;">${DATA.session.signature.style}</p></div>
            <div class="debrief-card"><div class="micro">Trust profile</div><p style="margin-top:8px;">${DATA.session.signature.trust}</p></div>
            <div class="debrief-card"><div class="micro">Bot dependency</div><p style="margin-top:8px;">${DATA.session.signature.dependency}</p></div>
          </div>
          <div class="debrief-card"><div class="micro">Key insight</div><p style="margin-top:8px;line-height:1.65;">${DATA.session.signature.insight}</p></div>
        </div>`;
    }

    function renderHeader() {
      const h = state.highlight;
      const label = h ? highlightLabel(h) : '';
      return `
        <div class="hero">
          <div class="hero-top">
            <div>
              <h1>Songoy-Cojal Assessment Dashboard</h1>
              <p class="sub">Lean single-site dashboard for the completed CBSA assessment. Themes stay visible, the knowledge graph is omitted, and the map uses inferred geocoding where the assessment and place references support it.</p>
            </div>
            <div class="chip-row">
              ${badge('Songoy-Cojal','primary')}
              ${badge('KG omitted','warn')}
              ${badge('Themes retained','good')}
              ${badge('Assessment date: 3 April 2026')}
            </div>
          </div>
        </div>
        <div class="banner-wrap">
          ${h ? `<div class="banner">Highlight: ${label}</div><button class="back-pill" data-action="clear-highlight">Clear</button>` : ''}
          ${state.backTab ? `<button class="back-pill" data-action="back-tab">← Back to ${TABS.find(t => t.id === state.backTab).label}</button>` : ''}
        </div>
        <div class="tabs">${TABS.map(t => `<button class="tab ${state.tab === t.id ? 'active' : ''}" data-action="tab" data-id="${t.id}">${t.label}</button>`).join('')}</div>`;
    }

    function highlightLabel(h) {
      if (h.type === 'value') return DATA.values.find(v => v.id === h.id)?.category || h.id;
      if (h.type === 'context') return DATA.contexts.find(c => c.id === h.id)?.type || h.id;
      if (h.type === 'comparator') return DATA.comparators.find(c => c.id === h.id)?.name || h.id;
      if (h.type === 'theme') {
        const all = [...DATA.themes.valueThemes, ...DATA.themes.contextThemes, ...DATA.themes.threatThemes];
        return all.find(t => t.id === h.id)?.label || h.id;
      }
      return h.id;
    }

    function panel(tab) {
      const content = {
        overview: renderOverview,
        map: renderMap,
        timeline: renderTimeline,
        cv: renderCV,
        themes: renderThemes,
        integrity: renderIntegrity,
        comparative: renderComparative,
        significance: renderSignificance,
        report: renderReport,
        debrief: renderDebrief,
        session: renderSession
      }[tab]();
      return `<section class="panel ${state.tab === tab ? 'active' : ''}" id="panel-${tab}">${content}</section>`;
    }

    function render() {
      document.getElementById('app').innerHTML = `
        <div class="app">
          ${renderHeader()}
          ${TABS.map(t => panel(t.id)).join('')}
        </div>`;
      initMap();
    }

    function initMap() {
      const box = document.getElementById('map');
      if (!box || typeof L === 'undefined' || DATA.asset.coordinates.lat == null) return;
      if (mapInstance) {
        mapInstance.remove();
        mapInstance = null;
        markerRefs = {};
      }
      mapInstance = L.map('map', { zoomControl: true });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors' }).addTo(mapInstance);

      const points = [];
      const asset = L.circleMarker([DATA.asset.coordinates.lat, DATA.asset.coordinates.lng], {
        radius: 10,
        fillColor: '#2563eb',
        color: '#ffffff',
        weight: 2,
        fillOpacity: .95,
        dashArray: '4 2'
      }).addTo(mapInstance).bindPopup(`<strong>${DATA.asset.name}</strong><br>${DATA.asset.type}<br>${DATA.asset.period}<br>${DATA.authenticity.summary}`);
      markerRefs.asset = asset;
      points.push([DATA.asset.coordinates.lat, DATA.asset.coordinates.lng]);

      DATA.comparators.forEach(c => {
        if (c.coordinates.lat == null) return;
        const color = c.criteria.rarity === 'high' ? '#16a34a' : c.criteria.rarity === 'moderate' ? '#ca8a04' : '#94a3b8';
        const marker = L.circleMarker([c.coordinates.lat, c.coordinates.lng], {
          radius: 7,
          fillColor: '#94a3b8',
          color,
          weight: 2,
          fillOpacity: .92,
          dashArray: c.coordinateSource.startsWith('inferred') ? '4 2' : null
        }).addTo(mapInstance).bindPopup(`<strong>${c.name}</strong><br>${c.period}<br>${c.distinction.slice(0,90)}...`);
        marker.on('click', () => setHighlight('comparator', c.id, 'map', 'comparative'));
        markerRefs[c.id] = marker;
        points.push([c.coordinates.lat, c.coordinates.lng]);
      });

      if (points.length === 1) mapInstance.setView(points[0], 12);
      else mapInstance.fitBounds(points, { padding: [40, 40] });

      document.addEventListener('click', function(e){ if(e.target.closest('.leaflet-popup-close-button') && mapInstance){ e.preventDefault(); mapInstance.closePopup(); } });

      if (state.highlight?.type === 'comparator' && markerRefs[state.highlight.id]) markerRefs[state.highlight.id].openPopup();
    }

    function exportHtml() {
      try {
        const clone = document.documentElement.cloneNode(true);
        const blob = new Blob(['<!DOCTYPE html>\n' + clone.outerHTML], { type:'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'songoy-cojal-dashboard.html';
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 500);
      } catch (e) {
        alert('Download is blocked in this canvas. Save the file from the workspace to export it.');
      }
    }

    function printReport() {
      try { window.print(); }
      catch (e) { alert('Print is blocked in this canvas. Save the file and print it locally.'); }
    }

    document.addEventListener('click', e => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      const id = btn.dataset.id;
      if (action === 'tab') return setTab(id, true);
      if (action === 'toggle-guide') { state.guide[id] = !state.guide[id]; saveGuide(id, state.guide[id]); return render(); }
      if (action === 'highlight-context') return setHighlight('context', id);
      if (action === 'highlight-value') return setHighlight('value', id);
      if (action === 'highlight-theme') return setHighlight('theme', id);
      if (action === 'clear-highlight') return clearHighlight();
      if (action === 'back-tab') return setTab(state.backTab || 'overview', true);
      if (action === 'theme-mode') { state.themeMode = id; return render(); }
      if (action === 'theme-member') {
        return btn.dataset.kind === 'value'
          ? setHighlight('value', id, 'themes', 'cv')
          : setHighlight('context', id, 'themes', 'cv');
      }
      if (action === 'jump-theme') return setHighlight('theme', id, 'cv', 'themes');
      if (action === 'goto-map') return setHighlight('comparator', id, 'comparative', 'map');
      if (action === 'jump-comparator') return setHighlight('comparator', id, 'map', 'comparative');
      if (action === 'export-html') return exportHtml();
      if (action === 'print-report') return printReport();
    });

    try {
      window.addEventListener('popstate', () => {
        const hash = (location.hash || '').replace('#','');
        if (TABS.some(t => t.id === hash)) { state.tab = hash; render(); }
      });
    } catch (e) {}

    render();
  </script>
</body>
</html>
