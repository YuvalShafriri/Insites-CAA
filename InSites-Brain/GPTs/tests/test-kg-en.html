<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Graph — Millwright's Tower (EN test)</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;800&family=Noto+Sans+Hebrew:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../runtime/kg-runtime.css" />
  <style>
    #kg-app { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="kg-app">
    <div id="kg-toolbar"></div>
    <div id="kg-network"></div>
    <aside id="kg-sidebar"></aside>
  </div>

  <script>
    window.__DATA_JSON__ = {
      "title": "Millwright's Tower — Heritage Knowledge Graph",
      "nodes": [
        {
          "id": "asset_tower",
          "name": "Millwright's Tower",
          "type": "Asset",
          "meaning": "14th-century fortified mill tower on the River Ouse"

        {

          "name": "River Ouse",
          "type": "Natural Phenomenon",
          "meaning": "Water source powering the mill and shaping the landscape"
        },
        {

          "type": "Historical Period",
          "meaning": "Era of guild-controlled milling and fortified infrastructure"
        },
        {
          "id": "guild_millers",
          "name": "Guild of Millers",
          "type": "Social Group",
          "meaning": "Trade guild that built and operated the tower mill"
        },
        {
          "id": "wheel_mechanism",
          "name": "Waterwheel Mechanism",
          "type": "Architectural Element",
          "meaning": "Original undershot wheel, partially surviving in the lower chamber"
        },
        {

          "name": "Grain Milling Tradition",

          "meaning": "Continuous milling practice from 14th to 19th century"

        },
        {
          "id": "event_flood",
          "name": "Great Flood of 1421",
          "type": "Event",
          "meaning": "Flood that damaged the original wheel and prompted reconstruction"
        },
        {
          "id": "story_ghost",
          "name": "Legend of the Night Miller",

        {
          "id": "person_abbot",
          "name": "Abbot William de Selby",

        { "from": "asset_tower",     "to": "place_york",        "label": "located_near" },
        { "from": "guild_millers",   "to": "milling_tradition", "label": "practiced" },
        { "from": "milling_tradition","to": "value_tech",       "label": "expresses_value" },
