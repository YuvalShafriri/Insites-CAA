<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>גרף ידע — מגדל הטוחן</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
*, *::before, *::after { box-sizing: border-box; }
html, body { height: 100vh; margin: 0; padding: 0; }
body, #infowindow, #infowindow *, #mynetwork, #mynetwork * {
  font-family: "Noto Sans", "Noto Sans Hebrew", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  -webkit-font-smoothing: antialiased; color: #222; line-height: 1.4;
}
#mynetwork { width: 100%; height: 100vh; border: 1px solid #e6e6e6; background: transparent; position: relative; overflow: hidden; }
#infowindow {
  display: none; visibility: hidden; position: fixed;
  background: #fff; border: 1px solid #ccc; padding: 12px;
  line-height: 1.45; box-shadow: 0 6px 18px rgba(0,0,0,.12);
  max-width: 320px; font-size: 14px; border-radius: 8px;
  z-index: 9999; color: #222;
}
#infowindow .title-row { display:flex; align-items:center; justify-content:space-between; gap:12px; position:relative; padding-right:36px; margin-bottom:4px; }
#infowindow h3 { margin:0; font-weight:600; font-size:15px; flex:1 1 auto; color:#222; }
#infowindow p { margin:6px 0; padding:0; font-size:13.5px; color:#333; }
#closeinfo { position:absolute; top:8px; right:8px; cursor:pointer; font-weight:700; padding:4px 8px; line-height:1; border-radius:4px; color:#444; background:transparent; border:none; }
#closeinfo:hover { background:#f2f2f2; }
#infowindow[dir="rtl"] .title-row { padding-right:12px; padding-left:36px; }
#infowindow[dir="rtl"] #closeinfo { left:8px; right:auto; }
body[dir="rtl"], html[dir="rtl"] { direction: rtl; }
#infowindow[dir="rtl"] { text-align: right; }
#closeinfo:focus { outline: 2px solid #0078d4; outline-offset: 2px; }
  </style>
</head>
<body>
  <div id="mynetwork"></div>
  <div id="infowindow" role="dialog" aria-hidden="true">
    <div class="title-row">
      <h3 id="info_name"></h3>
      <span id="closeinfo" aria-label="סגור">✖</span>
    </div>
    <p><strong>סוג:</strong> <span id="info_type"></span></p>
    <p><strong>משמעות:</strong> <span id="info_meaning"></span></p>
  </div>

  <script>
    window.__DATA_JSON__ = {
      "nodes": [
        { "id": "tower", "name": "מגדל הטוחן", "type": "Structure / Building", "meaning": "טחנת מים מהמאה ה-14 שהוסבה למחסן תבואה, כיום מרכז מורשת" },
        { "id": "river", "name": "נחל הגשר", "type": "Natural Phenomenon", "meaning": "מקור המים שהניע את הטחנה ועיצב את היישוב בעמק" },
        { "id": "period", "name": "תקופת סחר הצמר", "type": "Historical Period", "meaning": "תקופה כלכלית שהניעה את הרחבת הטחנה במאה ה-15" },
        { "id": "guild", "name": "חבורת הטוחנים", "type": "Social Group", "meaning": "קהילת אומנים ששמרה על מסורות הטחינה לאורך שלושה דורות" },
        { "id": "wheel", "name": "גלגל המים העליון", "type": "Architectural Element", "meaning": "מנגנון עץ אלון ששרד ומדגים הנדסה הידראולית מימי הביניים" },
        { "id": "harvest", "name": "ברכת הקציר", "type": "Tradition / Custom", "meaning": "טקס קהילתי שנתי המקשר את מחזור החקלאות לאתר הטחנה" },
        { "id": "v_tech", "name": "ערך טכנולוגי", "type": "Cultural Value", "meaning": "ידע הנדסי הידראולי המגולם במנגנון הטחנה ששרד" },
        { "id": "v_social", "name": "ערך חברתי", "type": "Cultural Value", "meaning": "התכנסות קהילתית מתמשכת וזהות משותפת באתר הטחנה" }
      ],
      "edges": [
        { "from": "tower", "to": "river", "label": "powered_by" },
        { "from": "tower", "to": "period", "label": "expanded_during" },
        { "from": "guild", "to": "tower", "label": "maintained" },
        { "from": "wheel", "to": "tower", "label": "part_of" },
        { "from": "harvest", "to": "tower", "label": "takes_place_at" },
        { "from": "tower", "to": "v_tech", "label": "expresses_value" },
        { "from": "tower", "to": "v_social", "label": "expresses_value" },
        { "from": "guild", "to": "v_tech", "label": "supports" },
        { "from": "harvest", "to": "v_social", "label": "supports" },
        { "from": "river", "to": "wheel", "label": "drives" }
      ]
    };
  </script>

  <script>
/* kg.js — Universal Knowledge Graph Engine (RTL/LTR auto-detect) — same code as EN test */
(function () {
  "use strict";
  var isRTL = function(s) { return /[\u0591-\u07FF\uFB1D-\uFDFD\uFE70-\uFEFC]/.test(s || ""); };
  function sanitizeText(text) {
    if (typeof text !== "string") return text;
    return text.replace(/[\u201C\u201D]/g, '"').replace(/[\u2018\u2019]/g, "'").trim();
  }
  function getGraphData() {
    if (window.__DATA_JSON__ && window.__DATA_JSON__.nodes) return window.__DATA_JSON__;
    if (typeof __DATA_JSON__ !== "undefined" && __DATA_JSON__) return __DATA_JSON__;
    var c = document.getElementById("mynetwork");
    if (c && c.dataset.kgData) { try { return JSON.parse(c.dataset.kgData); } catch(e){} }
    return { nodes: [], edges: [] };
  }
  var DATA = getGraphData();
  var anyRTL = Array.isArray(DATA.nodes) && DATA.nodes.some(function(n){ return isRTL(n.name) || isRTL(n.meaning); });

  (function setupDir() {
    document.documentElement.lang = anyRTL ? "he" : "en";
    document.documentElement.dir = anyRTL ? "rtl" : "ltr";
    document.body.dir = anyRTL ? "rtl" : "ltr";
    if (anyRTL) document.body.classList.add("rtl");
  })();

  var COLOR_BY_TYPE = {
    "Natural Phenomenon": { background: "rgba(30,144,255,0.7)", border: "#1E90FF" },
    "Structure / Building": { background: "rgba(178,34,34,0.7)", border: "#B22222" },
    "Architectural Element": { background: "rgba(129,199,132,0.7)", border: "#81C784" },
    "Person": { background: "rgba(255,105,180,0.7)", border: "#FF69B4" },
    "Event": { background: "rgba(255,160,122,0.7)", border: "#FFA07A" },
    "Story / Narrative": { background: "rgba(255,228,181,0.7)", border: "#FFE4B5" },
    "Social Group": { background: "rgba(255,215,0,0.7)", border: "#FFD700" },
    "Cultural Value": { background: "rgba(255,193,7,0.7)", border: "#FFC107" },
    "Value": { background: "rgba(255,193,7,0.7)", border: "#FFC107" },
    "Place": { background: "rgba(100,149,237,0.7)", border: "#6495ED" },
    "Artwork / Artefact": { background: "rgba(128,0,128,0.7)", border: "#800080" },
    "Tradition / Custom": { background: "rgba(139,69,19,0.7)", border: "#8B4513" },
    "Historical Period": { background: "rgba(0,180,180,0.7)", border: "#00B4B4" },
    "Religion / Belief": { background: "rgba(218,112,214,0.7)", border: "#DA70D6" },
    "Collective Memory": { background: "rgba(75,0,130,0.7)", border: "#4B0082" }
  };
  var FALLBACK_COLOR = { background: "rgba(200,200,200,0.6)", border: "#666" };

  var CANONICAL_TYPE_MAP = {
    "\u05EA\u05D5\u05E4\u05E2\u05D4 \u05D8\u05D1\u05E2\u05D9\u05EA": "Natural Phenomenon",
    "\u05DE\u05D1\u05E0\u05D4": "Structure / Building",
    "\u05D0\u05DC\u05DE\u05E0\u05D8 \u05D0\u05D3\u05E8\u05D9\u05DB\u05DC\u05D9": "Architectural Element",
    "\u05D3\u05DE\u05D5\u05EA": "Person",
    "\u05E7\u05D1\u05D5\u05E6\u05D4 \u05D7\u05D1\u05E8\u05EA\u05D9\u05EA": "Social Group",
    "\u05D0\u05D9\u05E8\u05D5\u05E2": "Event",
    "\u05E1\u05D9\u05E4\u05D5\u05E8": "Story / Narrative",
    "\u05E2\u05E8\u05DA \u05EA\u05E8\u05D1\u05D5\u05EA\u05D9": "Cultural Value",
    "\u05DE\u05E7\u05D5\u05DD": "Place",
    "\u05DE\u05E1\u05D5\u05E8\u05EA": "Tradition / Custom",
    "\u05EA\u05E7\u05D5\u05E4\u05D4 \u05D4\u05D9\u05E1\u05D8\u05D5\u05E8\u05D9\u05EA": "Historical Period",
    "\u05D3\u05EA / \u05D0\u05DE\u05D5\u05E0\u05D4": "Religion / Belief",
    "\u05D6\u05D9\u05DB\u05E8\u05D5\u05DF \u05E7\u05D5\u05DC\u05E7\u05D8\u05D9\u05D1\u05D9": "Collective Memory"
  };
  var HEBREW_LABEL = {
    "Natural Phenomenon": "\u05EA\u05D5\u05E4\u05E2\u05D4 \u05D8\u05D1\u05E2\u05D9\u05EA",
    "Structure / Building": "\u05DE\u05D1\u05E0\u05D4",
    "Architectural Element": "\u05D0\u05DC\u05DE\u05E0\u05D8 \u05D0\u05D3\u05E8\u05D9\u05DB\u05DC\u05D9",
    "Person": "\u05D3\u05DE\u05D5\u05EA", "Event": "\u05D0\u05D9\u05E8\u05D5\u05E2",
    "Story / Narrative": "\u05E1\u05D9\u05E4\u05D5\u05E8 / \u05E0\u05E8\u05D8\u05D9\u05D1",
    "Social Group": "\u05E7\u05D1\u05D5\u05E6\u05D4 \u05D7\u05D1\u05E8\u05EA\u05D9\u05EA",
    "Cultural Value": "\u05E2\u05E8\u05DA \u05EA\u05E8\u05D1\u05D5\u05EA\u05D9",
    "Value": "\u05E2\u05E8\u05DA \u05EA\u05E8\u05D1\u05D5\u05EA\u05D9",
    "Place": "\u05DE\u05E7\u05D5\u05DD",
    "Tradition / Custom": "\u05DE\u05E1\u05D5\u05E8\u05EA / \u05DE\u05E0\u05D4\u05D2",
    "Historical Period": "\u05EA\u05E7\u05D5\u05E4\u05D4 \u05D4\u05D9\u05E1\u05D8\u05D5\u05E8\u05D9\u05EA",
    "Religion / Belief": "\u05D3\u05EA / \u05D0\u05DE\u05D5\u05E0\u05D4",
    "Collective Memory": "\u05D6\u05D9\u05DB\u05E8\u05D5\u05DF \u05E7\u05D5\u05DC\u05E7\u05D8\u05D9\u05D1\u05D9"
  };

  function normalize(t) {
    if (!t) return "General";
    var s = String(t).trim();
    if (CANONICAL_TYPE_MAP[s]) return CANONICAL_TYPE_MAP[s];
    if (s.toLowerCase() === "cultural value" || s.toLowerCase() === "value") return "Cultural Value";
    if (COLOR_BY_TYPE[s]) return s;
    return "General";
  }

  DATA.nodes = Array.isArray(DATA.nodes) ? DATA.nodes : [];
  DATA.edges = Array.isArray(DATA.edges) ? DATA.edges : [];

  DATA.nodes.forEach(function(n, i) {
    if (!n.id) n.id = "node_" + i;
    n.name = sanitizeText(n.name) || (anyRTL ? "\u05D9\u05E9\u05D5\u05EA " + n.id : "Entity " + n.id);
    var origType = sanitizeText(n.type) || (anyRTL ? "\u05DB\u05DC\u05DC\u05D9" : "General");
    var canon = normalize(origType);
    if (anyRTL) {
      n.display_type = isRTL(origType) ? origType : (HEBREW_LABEL[canon] || origType);
    } else {
      n.display_type = canon !== "General" ? canon : origType;
    }
    n.meaning = sanitizeText(n.meaning || "");
    n.label = n.name;
    var c = n.color || COLOR_BY_TYPE[canon] || FALLBACK_COLOR;
    n.color = { background: c.background, border: c.border };
    n.shape = n.shape || "box";
    delete n.title;
  });

  var container = document.getElementById("mynetwork");
  if (!container) return;
  if (!DATA.nodes.length) { container.innerHTML = '<div style="padding:20px;text-align:center;">\u05D0\u05D9\u05DF \u05E0\u05EA\u05D5\u05E0\u05D9\u05DD.</div>'; return; }

  var nodes = new vis.DataSet(DATA.nodes);
  var edges = new vis.DataSet(DATA.edges);
  var ff = anyRTL ? "Noto Sans Hebrew, Noto Sans, Arial" : "Noto Sans, Arial";

  var network = new vis.Network(container, { nodes: nodes, edges: edges }, {
    nodes: { font: { align:"center", size:14, color:"#222", face:ff }, borderWidth:1, margin:{top:8,right:10,bottom:8,left:10}, widthConstraint:{maximum:180} },
    edges: { arrows:{to:{enabled:true,scaleFactor:0.45}}, font:{align:"middle",size:11,color:"#555",background:"white",face:ff}, smooth:{type:"cubicBezier",forceDirection:"horizontal",roundness:0.5}, color:{color:"#848484",highlight:"#333",hover:"#555",inherit:false} },
    layout: { improvedLayout: true },
    physics: { enabled:true, solver:"repulsion", repulsion:{nodeDistance:240,centralGravity:0.04,springLength:22,springConstant:0.003,damping:0.09}, stabilization:{iterations:800,fit:true} },
    interaction: { hover:false, multiselect:false, dragNodes:true }
  });

  var info = document.getElementById("infowindow");
  var closeBtn = document.getElementById("closeinfo");
  function hide() { if(!info) return; info.style.display="none"; info.style.visibility="hidden"; info.setAttribute("aria-hidden","true"); }
  if (info) { info.setAttribute("dir", anyRTL?"rtl":"ltr"); info.style.textAlign = anyRTL?"right":"left"; }
  if (closeBtn) closeBtn.addEventListener("click", hide);
  document.addEventListener("keydown", function(e){ if(e.key==="Escape") hide(); });

  network.on("click", function(p) {
    if (!info) return;
    if (!p.nodes || !p.nodes.length) { hide(); return; }
    var node = nodes.get(p.nodes[0]);
    if (!node) { hide(); return; }
    document.getElementById("info_name").textContent = node.name || "";
    document.getElementById("info_type").textContent = node.display_type || node.type || "";
    document.getElementById("info_meaning").textContent = node.meaning || "";
    info.style.visibility = "hidden"; info.style.display = "block";
    var iw = info.offsetWidth||320, ih = info.offsetHeight||160, pad=12;
    var xV = p.pointer&&p.pointer.DOM? p.pointer.DOM.x : window.innerWidth/2;
    var yV = p.pointer&&p.pointer.DOM? p.pointer.DOM.y : window.innerHeight/2;
    var x = xV+12, y = yV-12;
    var vw = document.documentElement.clientWidth, vh = document.documentElement.clientHeight;
    if (x+iw+pad>vw) x = Math.max(pad, xV-iw-12);
    if (y+ih+pad>vh) y = Math.max(pad, vh-ih-pad);
    if (y<pad) y=pad;
    info.style.left = x+"px"; info.style.top = y+"px";
    info.style.visibility = "visible"; info.setAttribute("aria-hidden","false");
  });

  window.__KG_DEBUG = { DATA:DATA, nodes:nodes, edges:edges, network:network, anyRTL:anyRTL };
})();
  </script>
</body>
</html>
